<section th:fragment="hero" class="py-20">

<div class="max-w-6xl mx-auto flex flex-col lg:flex-row items-center justify-between gap-20 px-6">

    
    <div class="flex justify-center w-full lg:w-1/2">
        <img 
        th:src="@{/images/register/hero.webp}"
        class="h-[500px] object-contain"
        />
    </div>


   
    <div class="bg-[#F6A800] p-8 rounded-[22px] w-[367px] shadow-xl">

        <div id="thankYouCard" class="text-center py-10 hidden">

            <h2 class="text-2xl font-bold text-white mb-4">
                Thank You 🎉
            </h2>

            <p class="text-white text-sm mb-6">
                Your form has been submitted successfully.
            </p>

        </div>


        <form
              th:object="${admission}" 
              class="space-y-3"
              id="admissionForm">

            <div>
                <label class="text-xs font-semibold">Full Name *</label>

                <input
                type="text"
                name="firstName"
                placeholder="Enter your full name"
                class="w-full mt-1 p-2.5 rounded-md bg-gray-100 outline-none">
            </div>


            <div>
                <label class="text-xs font-semibold">Email Address *</label>

                <input
                type="email"
                name="email"
                placeholder="Enter your email"
                class="w-full mt-1 p-2.5 rounded-md bg-gray-100 outline-none">
            </div>


            <div class="grid grid-cols-2 gap-3">

                <div>
                    <label class="text-xs font-semibold">Mobile *</label>

                    <input
                    type="tel"
                    name="mobile"
                    placeholder="Mobile number"
                    class="w-full mt-1 p-2.5 rounded-md bg-gray-100 outline-none">
                </div>

                <div>
                    <label class="text-xs font-semibold">City *</label>

                    <input
                    type="text"
                    name="city"
                    placeholder="Lucknow"
                    class="w-full mt-1 p-2.5 rounded-md bg-gray-100 outline-none">
                </div>

            </div>


            <div class="grid grid-cols-2 gap-3">

                <div>
                    <label class="text-xs font-semibold">State *</label>

                    <input
                    type="text"
                    name="stateDistrict"
                    placeholder="Uttar Pradesh"
                    class="w-full mt-1 p-2.5 rounded-md bg-gray-100 outline-none">
                </div>

                <div>
                    <label class="text-xs font-semibold">Pin Code *</label>

                    <input
                    type="text"
                    name="pinCode"
                    placeholder="226010"
                    class="w-full mt-1 p-2.5 rounded-md bg-gray-100 outline-none">
                </div>

            </div>


            <div class="grid grid-cols-2 gap-3">

                <div>
                    <label class="text-xs font-semibold">Location *</label>

                    <input
                    type="text"
                    name="location"
                    placeholder="Gomti Nagar"
                    class="w-full mt-1 p-2.5 rounded-md bg-gray-100 outline-none">
                </div>

                <div>
                    <label class="text-xs font-semibold">Country *</label>

                    <input
                    type="text"
                    name="country"
                    placeholder="India"
                    class="w-full mt-1 p-2.5 rounded-md bg-gray-100 outline-none">
                </div>

            </div>
			
			
			
			<div style="position:absolute; left:-9999px;">
			    <input type="text" name="preschooloratricskidzz" autocomplete="off">
			</div>

            
            <input type="hidden" id="captchaToken" name="captcha">


            <button
            type="submit"
            class="w-full bg-[#8B0000] hover:bg-red-800 text-white font-semibold py-3 rounded-xl mt-3">
            Submit
            </button>

        </form>

    </div>

</div>

</section>


<script src="https://www.google.com/recaptcha/api.js?render=6LcquIUsAAAAAJdpCAuCa9GCm8H-okRMP1HjSZwQ"></script>
