<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Oratrics Pre-school | Play, Learn, Grow</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Outfit:wght@100..900&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@300;400;600;700;800&display=swap" rel="stylesheet">

    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>

    <style>
        [x-cloak] {
            display: none !important;
        }
        
        body {
            font-family: 'Nunito', sans-serif !important;
        }
    </style>
</head>

<body class="lg:mx-35 md:mx-10 mx-4 font-sans text-gray-900 overflow-x-hidden">

    <div th:replace="fragments/navbar :: navbar"></div>

    <div th:replace="about/hero :: hero"></div>

    <div th:replace="about/bird :: bird"></div>


    <div th:replace="about/subhero :: subhero"></div>

    <div th:replace="about/second :: second"></div>

    <div th:replace="about/third :: third"></div>




    <section class="relative overflow-hidden py-20 bg-[#F6E2A6]">


        <div class="absolute inset-y-0 left-0 w-[88%] bg-[#EBCB82]" style="border-radius:0 260px 260px 0;">
        </div>


        <div class="absolute right-[-120px] bottom-[-100px]
      w-[420px] h-[420px]
      border border-gray-400 border-dashed
      rounded-full opacity-40">
        </div>

        <!-- Content -->
        <div class="relative max-w-7xl mx-auto px-4" x-data="serviceSlider()">

            <!-- Heading -->
            <h2 class="text-center text-3xl md:text-4xl font-bold text-[#3B2B4A] mb-4">
                The Oratrics Philosophy
            </h2>

            <p class="text-center  mb-4">

                At Oratrics Kidzz, we operate on a simple principle <br /> We do not measure success only by worksheets completed. We measure it by:
            </p>


            <!-- Slider -->
            <div class="overflow-hidden">
                <div class="flex transition-transform duration-500" :style="`transform: translateX(-${current * slideWidth}%)`">

                    <template x-for="item in services" :key="item.title">
                        <div class="w-full sm:w-1/2 lg:w-1/4 flex-shrink-0 px-3">

                            <div class="bg-white p-6 rounded-xl shadow-md hover:shadow-xl transition h-full">

                                <!-- Icon -->
                                <div class="w-12 h-12 flex items-center justify-center
                          bg-[#FBE4D8] rounded-lg mb-4 text-xl">
                                    <span x-text="item.icon"></span>
                                </div>

                                <!-- Title -->
                                <h4 class="font-bold text-sm uppercase tracking-wide mb-2">
                                    <span x-text="item.title"></span>
                                </h4>

                                <!-- Description -->
                                <p class="text-sm text-gray-600 leading-relaxed" x-text="item.desc"></p>

                            </div>

                        </div>
                    </template>

                </div>
            </div>

            <!-- Slider Arrows -->
            <div class="flex gap-3 mt-12">
                <button @click="prev" class="w-10 h-10 rounded-full border border-gray-400 flex items-center justify-center hover:bg-white transition">
                    ←
                </button>

                <button @click="next" class="w-10 h-10 rounded-full border border-black bg-white flex items-center justify-center">
                    →
                </button>
            </div>

        </div>
    </section>


    <!-- Alpine JS Slider -->
    <script>
        function serviceSlider() {
            return {
                current: 0,

                services: [{
                    icon: "📚",
                    title: "Speech",
                    desc: "A child volunteering to speak"
                }, {
                    icon: "🎨",
                    title: "New Age Learning",
                    desc: " A child asking curious questions"
                }, {
                    icon: "🤝",
                    title: "Confidence",
                    desc: " A child expressing ideas clearly"
                }, {
                    icon: "🛡️",
                    title: "Leadership Development",
                    desc: "A child showing leadership tendencies"
                }, {
                    icon: "🌱",
                    title: "International Citizenship",
                    desc: "Making kids interact with peers worldwide & making them a global citizen since childhood."
                }],

                get slideWidth() {
                    if (window.innerWidth >= 1024) return 25;
                    if (window.innerWidth >= 640) return 50;
                    return 100;
                },

                next() {
                    let visible =
                        window.innerWidth >= 1024 ? 4 :
                        window.innerWidth >= 640 ? 2 : 1;

                    if (this.current < this.services.length - visible) {
                        this.current++;
                    }
                },

                prev() {
                    if (this.current > 0) this.current--;
                }
            }
        }
    </script>



    <div th:replace="about/slider :: slider"></div>

    <div th:replace="about/fifth :: fifth"></div>




    <div th:replace="fragments/mange :: mange"></div>


    <div th:replace="fragments/footer :: footer"></div>



</body>

</html>
